kind = "web"
previewPath = "/"
title = "Ad Scheduler"
version = "1.0.0"
id = "artifacts/ad-scheduler"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26228

[services.development]
run = "pnpm --filter @workspace/ad-scheduler run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ad-scheduler", "run", "build" ]
serve = "static"
publicDir = "artifacts/ad-scheduler/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26228"
BASE_PATH = "/"
